<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TeamPlay Cases</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #000; color: #fff; text-align: center; font-family: sans-serif;">
    
    <h1>Case Opener (Beta)</h1>
    <div id="balance">Баланс: $1000</div>
    
    <div class="case-container" style="margin: 50px auto; border: 2px solid #333; width: 300px; padding: 20px;">
        <img src="https://via.placeholder.com/150" id="item-img" alt="Item">
        <h3 id="item-name">Нажми, чтобы открыть!</h3>
        <button id="open-btn" style="padding: 10px 20px; cursor: pointer;">Открыть за $50</button>
    </div>

    <script src="app.js"></script>
</body>
</html>

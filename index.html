<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJOR WIN | Реальные шансы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen overflow-x-hidden">

    <!-- Навигация -->
    <nav class="fixed top-0 left-0 right-0 z-[100] bg-black/90 border-b border-red-600/30 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2 cursor-pointer group" onclick="showSection('home')">
                    <div class="w-10 h-10 bg-red-600 flex items-center justify-center rounded-lg rotate-45 group-hover:rotate-0 transition-all duration-500 shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                        <i class="fa-solid fa-bolt text-white -rotate-45 group-hover:rotate-0 transition-all"></i>
                    </div>
                    <span class="text-2xl font-black tracking-tighter text-white">MAJOR WIN</span>
                </div>
                
                <div class="hidden md:flex items-center gap-6 text-sm font-bold uppercase tracking-widest text-gray-400">
                    <button onclick="showSection('home')" class="nav-link hover:text-red-500 transition-colors">Кейсы</button>
                    <button onclick="showSection('upgrades')" class="nav-link hover:text-red-500 transition-colors">Апгрейды</button>
                    <button onclick="showSection('contracts')" class="nav-link hover:text-red-500 transition-colors">Контракты</button>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="bg-zinc-900 border border-white/5 rounded-md px-4 py-2 flex items-center gap-3">
                    <i class="fa-solid fa-wallet text-red-600"></i>
                    <span id="balance-display" class="font-mono font-bold text-lg">$100.00</span>
                </div>
                <button onclick="showSection('profile')" class="w-12 h-12 bg-zinc-900 border border-red-600/20 rounded-full flex items-center justify-center hover:bg-red-600 transition-all group">
                    <i class="fa-solid fa-user group-hover:scale-110"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="pt-28 pb-20 max-w-7xl mx-auto px-4">
        
        <!-- SECTION: HOME -->
        <section id="sec-home" class="content-section animate-fade">
            <div class="relative py-20 text-center border border-red-600/20 rounded-3xl bg-gradient-to-b from-zinc-900 to-black overflow-hidden mb-12 shadow-2xl">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[300px] bg-red-600/10 blur-[120px] rounded-full"></div>
                <h1 class="text-5xl md:text-7xl font-black italic tracking-tighter mb-4 relative z-10">
                    ОТКРЫВАЙ КЕЙСЫ НА <span class="text-red-600">MAJOR WIN</span>
                </h1>
                <p class="text-gray-400 text-xl font-medium tracking-tight relative z-10">
                    Испытай удачу у нас. У нас реальные шансы!
                </p>
            </div>
            <div id="cases-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>

        <!-- SECTION: UPGRADES -->
        <section id="sec-upgrades" class="content-section hidden animate-fade">
            <div class="max-w-4xl mx-auto bg-zinc-900/50 p-8 rounded-3xl border border-white/5 text-center">
                <h2 class="text-3xl font-black mb-8 uppercase italic">Апгрейд скина</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-center">
                    <div id="upgrade-source" class="h-64 border-2 border-dashed border-zinc-800 rounded-2xl flex flex-center items-center justify-center cursor-pointer hover:border-red-600/50 transition-all">
                        <p class="text-zinc-600 uppercase font-bold">Выбери скин</p>
                    </div>
                    <div class="flex flex-col items-center gap-4">
                        <div id="upgrade-chance-circle" class="relative w-40 h-40 rounded-full border-8 border-zinc-800 flex items-center justify-center">
                            <span id="upgrade-chance-text" class="text-3xl font-black">0%</span>
                            <svg class="absolute inset-0 w-full h-full -rotate-90">
                                <circle id="upgrade-progress" cx="80" cy="80" r="72" fill="transparent" stroke="#dc2626" stroke-width="8" stroke-dasharray="452" stroke-dashoffset="452" stroke-linecap="round"></circle>
                            </svg>
                        </div>
                        <button id="btn-do-upgrade" class="w-full py-4 bg-red-600 hover:bg-red-700 disabled:opacity-50 disabled:hover:bg-red-600 rounded-xl font-black uppercase tracking-widest transition-all">Улучшить</button>
                    </div>
                    <div id="upgrade-target" class="h-64 border-2 border-dashed border-zinc-800 rounded-2xl flex items-center justify-center cursor-pointer hover:border-red-600/50 transition-all overflow-hidden">
                        <p class="text-zinc-600 uppercase font-bold">Цель апгрейда</p>
                    </div>
                </div>
                <div id="upgrade-inventory" class="mt-12 grid grid-cols-4 sm:grid-cols-6 gap-2 border-t border-white/5 pt-8"></div>
            </div>
        </section>

        <!-- SECTION: CONTRACTS -->
        <section id="sec-contracts" class="content-section hidden animate-fade text-center">
            <h2 class="text-4xl font-black mb-4 italic uppercase">Контракты обмена</h2>
            <p class="text-zinc-500 mb-12 uppercase tracking-widest text-sm font-bold">Минимум 3 скина для запуска</p>
            <div class="max-w-5xl mx-auto bg-zinc-900 p-10 rounded-3xl border border-red-600/20 relative">
                <div id="contract-slots" class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-10">
                    <!-- Слоты контракта -->
                </div>
                <button id="btn-do-contract" class="px-12 py-5 bg-white text-black hover:bg-red-600 hover:text-white transition-all rounded-full font-black uppercase tracking-widest disabled:opacity-20">Подписать контракт</button>
            </div>
            <div id="contract-inventory" class="mt-12 grid grid-cols-4 sm:grid-cols-8 gap-2 max-w-5xl mx-auto"></div>
        </section>

        <!-- SECTION: PROFILE -->
        <section id="sec-profile" class="content-section hidden animate-fade">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-zinc-900 p-8 rounded-3xl border border-white/5 h-fit">
                    <h3 class="text-xl font-black uppercase italic mb-6">Профиль игрока</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-zinc-500 mb-2">Ваш никнейм</label>
                            <div class="flex gap-2">
                                <input id="profile-name-input" type="text" class="flex-1 bg-black border border-zinc-800 rounded-lg px-4 py-2 outline-none focus:border-red-600" value="Новый игрок">
                                <button onclick="saveNick()" class="px-4 py-2 bg-red-600 rounded-lg font-bold">OK</button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-zinc-500 mb-2">Промокод</label>
                            <div class="flex gap-2">
                                <input id="promo-input" type="text" class="flex-1 bg-black border border-zinc-800 rounded-lg px-4 py-2 outline-none focus:border-red-600" placeholder="MAJOR2024">
                                <button onclick="usePromo()" class="px-4 py-2 bg-zinc-800 rounded-lg font-bold hover:bg-white hover:text-black">Ввод</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 space-y-6">
                    <h3 class="text-2xl font-black uppercase italic flex items-center gap-3">
                        Ваш инвентарь <span id="profile-inv-count" class="text-red-600 text-sm">0</span>
                    </h3>
                    <div id="profile-inventory-grid" class="grid grid-cols-2 sm:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </section>

        <!-- SECTION: CASE DETAIL -->
        <section id="sec-case-detail" class="content-section hidden animate-fade">
            <div class="bg-zinc-900 border border-white/5 rounded-3xl p-8 mb-8">
                <div id="roulette-container" class="relative h-48 bg-black rounded-2xl border-y-2 border-red-600/50 overflow-hidden mb-10">
                    <div class="absolute top-0 bottom-0 left-1/2 w-1 bg-red-600 z-10 -translate-x-1/2 shadow-[0_0_20px_#dc2626]"></div>
                    <div id="roulette-track" class="flex items-center absolute h-full transition-all"></div>
                </div>
                <div class="flex flex-col items-center">
                    <h2 id="case-title" class="text-4xl font-black italic uppercase mb-6 text-center"></h2>
                    <button id="btn-spin" onclick="startSpin()" class="px-16 py-5 bg-red-600 hover:bg-red-700 text-white rounded-full font-black text-xl uppercase tracking-widest shadow-[0_10px_30px_rgba(220,38,38,0.4)] hover:-translate-y-1 transition-all">Открыть за <span id="case-price"></span></button>
                </div>
            </div>
            <div id="case-loot-grid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
        </section>

    </main>

    <!-- Modal Win -->
    <div id="modal-win" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/95 backdrop-blur-xl">
        <div class="bg-zinc-900 border border-red-600/30 p-10 rounded-[40px] max-w-md w-full text-center relative overflow-hidden">
            <div id="modal-glow" class="absolute -top-24 left-1/2 -translate-x-1/2 w-64 h-64 blur-[100px] opacity-40"></div>
            <h3 class="text-zinc-500 font-bold uppercase tracking-[0.2em] mb-8">Новый предмет</h3>
            <div class="w-48 h-48 mx-auto mb-6 bg-black rounded-3xl border border-white/5 flex items-center justify-center">
                <i class="fa-solid fa-gun text-5xl text-zinc-800"></i>
            </div>
            <div id="win-rarity" class="text-xs font-black uppercase tracking-widest mb-2"></div>
            <h2 id="win-name" class="text-2xl font-black italic mb-2"></h2>
            <p id="win-price" class="text-red-500 font-bold text-xl mb-10"></p>
            <div class="flex gap-4">
                <button id="btn-win-sell" class="flex-1 py-4 bg-white text-black font-black uppercase rounded-xl hover:bg-red-600 hover:text-white transition-all">Продать</button>
                <button onclick="closeWinModal()" class="flex-1 py-4 bg-zinc-800 font-black uppercase rounded-xl hover:bg-zinc-700 transition-all">В инвентарь</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

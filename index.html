<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win | Case Battle</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .spin-anim { animation: spin 0.6s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .case-card { transition: all 0.2s; border: 1px solid #30363d; }
        .case-card:hover { border-color: #58a6ff; transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAZxG500x9pmjg1sy6iJXMKrUMhZ2TFFCk",
            authDomain: "major-win.firebaseapp.com",
            projectId: "major-win",
            storageBucket: "major-win.firebasestorage.app",
            messagingSenderId: "253408264315",
            appId: "1:253408264315:web:1246e65a3c2ed70c4362de"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ITEMS_DB = [
            { id: 1, name: "AWP | Dragon Lore", price: 5000, color: "bg-yellow-500" },
            { id: 2, name: "M4A4 | Howl", price: 2000, color: "bg-red-600" },
            { id: 3, name: "AK-47 | Vulcan", price: 400, color: "bg-blue-500" },
            { id: 4, name: "USP-S | Cyrex", price: 50, color: "bg-purple-500" },
            { id: 5, name: "P250 | Sand Dune", price: 5, color: "bg-gray-500" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ balance: 0, inventory: [], nickname: "" });
            const [isSpinning, setIsSpinning] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsub = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        try {
                            const docRef = db.collection("users").doc(u.uid);
                            const snap = await docRef.get();
                            if (snap.exists) {
                                setProfile(snap.data());
                            } else {
                                const initial = { balance: 1000, inventory: [], nickname: u.displayName || "Игрок" };
                                await docRef.set(initial);
                                setProfile(initial);
                            }
                        } catch (err) { console.error("Ошибка базы:", err); }
                    } else { setUser(null); }
                    setLoading(false);
                });
                return () => unsub();
            }, []);

            const openCase = async () => {
                if (profile.balance < 100 || isSpinning) return;
                setIsSpinning(true);
                
                setTimeout(async () => {
                    const drop = { ...ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)], instId: Date.now() };
                    const newProfile = {
                        ...profile,
                        balance: profile.balance - 100,
                        inventory: [...profile.inventory, drop]
                    };
                    try {
                        await db.collection("users").doc(user.uid).update(newProfile);
                        setProfile(newProfile);
                    } catch (e) { alert("Ошибка сохранения!"); }
                    setIsSpinning(false);
                }, 1200);
            };

            const sellItem = async (instId, price) => {
                const newInv = profile.inventory.filter(i => i.instId !== instId);
                const newProfile = { ...profile, balance: profile.balance + price, inventory: newInv };
                await db.collection("users").doc(user.uid).update(newProfile);
                setProfile(newProfile);
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-xl">Подключение к Major Win...</div>;

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[#0d1117]">
                    <h1 className="text-5xl font-black text-yellow-500 mb-8 tracking-tighter uppercase">Major Win</h1>
                    <button onClick={() => auth.signInWithPopup(provider)} className="bg-white text-black px-12 py-4 rounded-xl font-bold hover:bg-blue-400 transition-colors">
                        ВОЙТИ ЧЕРЕЗ GOOGLE
                    </button>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-10">
                    <header className="flex justify-between items-center bg-[#161b22] p-6 rounded-2xl border border-gray-800 mb-10">
                        <div>
                            <p className="text-gray-400 text-sm">Профиль: <span className="text-white font-bold">{profile.nickname}</span></p>
                            <p className="text-3xl font-black text-green-400">{profile.balance.toFixed(0)} $</p>
                        </div>
                        <button onClick={() => auth.signOut()} className="bg-gray-800 px-4 py-2 rounded-lg text-xs hover:bg-red-900 transition">ВЫХОД</button>
                    </header>

                    <main className="text-center">
                        <div className="py-20 bg-[#161b22] rounded-3xl border-2 border-dashed border-gray-800 relative overflow-hidden">
                            <div className={`text-9xl mb-10 inline-block ${isSpinning ? 'spin-anim' : ''}`}>
                                📦
                            </div>
                            <br/>
                            <button 
                                onClick={openCase}
                                disabled={isSpinning}
                                className="bg-yellow-500 text-black px-14 py-5 rounded-2xl font-black text-2xl uppercase shadow-lg shadow-yellow-500/20 active:scale-95 transition disabled:opacity-50"
                            >
                                {isSpinning ? "Удача..." : "Открыть кейс (100$)"}
                            </button>
                        </div>

                        <div className="mt-16 text-left">
                            <h2 className="text-xl font-bold mb-8 uppercase text-gray-500">Ваш инвентарь</h2>
                            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                                {profile.inventory.slice().reverse().map((item) => (
                                    <div key={item.instId} className="case-card bg-[#161b22] p-4 rounded-xl relative">
                                        <div className={`h-1 w-full ${item.color} absolute top-0 left-0 rounded-t-xl`} />
                                        <p className="text-xs font-bold mt-2 truncate">{item.name}</p>
                                        <p className="text-green-400 font-bold mt-1">{item.price}$</p>
                                        <button onClick={() => sellItem(item.instId, item.price)} className="mt-4 w-full bg-[#0d1117] border border-gray-700 py-1 text-[10px] rounded hover:bg-red-900 transition">ПРОДАТЬ</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

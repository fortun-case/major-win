<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win — У нас выигрывают</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');

        :root {
            --bg-deep: #080a0c;
            --bg-card: #12151a;
            --accent-gold: #ffb400;
            --accent-gold-glow: rgba(255, 180, 0, 0.4);
            --rarity-common: #4b5563;
            --rarity-rare: #3b82f6;
            --rarity-mythical: #a855f7;
            --rarity-legendary: #ec4899;
            --rarity-ancient: #ef4444;
            --rarity-gold: #fbbf24;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            background-image: radial-gradient(circle at 50% -20%, #1a1f26 0%, var(--bg-deep) 60%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(18, 21, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }

        .premium-btn {
            background: linear-gradient(135deg, #ffb400 0%, #ff8c00 100%);
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.3);
        }

        .premium-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.5);
        }

        .case-card {
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .case-card:hover {
            border-color: var(--accent-gold);
            transform: translateY(-5px);
        }

        .roulette-container {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }

        .case-carousel {
            display: flex;
            transition: transform 7s cubic-bezier(0.05, 0.3, 0.1, 1);
        }

        .roulette-item {
            min-width: 160px;
            height: 180px;
            background: rgba(255, 255, 255, 0.02);
            margin: 0 4px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 3px solid transparent;
        }

        .roulette-marker {
            position: absolute;
            left: 50%;
            top: -10px;
            bottom: -10px;
            width: 4px;
            background: var(--accent-gold);
            z-index: 20;
            transform: translateX(-50%);
            box-shadow: 0 0 20px var(--accent-gold);
            border-radius: 10px;
        }

        .item-glow-rare { box-shadow: inset 0 -20px 40px -20px rgba(59, 130, 246, 0.3); }
        .item-glow-legendary { box-shadow: inset 0 -20px 40px -20px rgba(236, 72, 153, 0.3); }
        .item-glow-gold { box-shadow: inset 0 -20px 40px -20px rgba(251, 191, 36, 0.3); }

        @keyframes pulse-gold {
            0% { box-shadow: 0 0 0 0 rgba(255, 180, 0, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 180, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 180, 0, 0); }
        }

        .pulse-effect {
            animation: pulse-gold 2s infinite;
        }
    </style>
</head>
<body>

    <header class="h-24 flex items-center border-b border-white/5 bg-black/40 backdrop-blur-md sticky top-0 z-[100]">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="flex items-center gap-12">
                <div class="text-3xl font-black italic tracking-tighter">
                    MAJOR<span class="text-[#ffb400] not-italic">WIN</span>
                </div>
                <nav class="hidden lg:flex items-center gap-1">
                    <button onclick="switchTab('main')" class="px-6 py-2 rounded-full hover:bg-white/5 transition font-semibold text-gray-400 hover:text-white" id="nav-main">Магазин</button>
                    <button onclick="switchTab('upgrades')" class="px-6 py-2 rounded-full hover:bg-white/5 transition font-semibold text-gray-400 hover:text-white" id="nav-upgrades">Апгрейды</button>
                    <button onclick="switchTab('contracts')" class="px-6 py-2 rounded-full hover:bg-white/5 transition font-semibold text-gray-400 hover:text-white" id="nav-contracts">Контракты</button>
                </nav>
            </div>

            <div class="flex items-center gap-4">
                <div id="user-info" class="hidden flex items-center gap-4">
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-1 pr-4 flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl premium-btn flex items-center justify-center text-xl">
                            <i class="fas fa-wallet"></i>
                        </div>
                        <div>
                            <div class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Баланс</div>
                            <div class="font-black text-[#ffb400]"><span id="user-balance">0.00</span> ₽</div>
                        </div>
                        <button onclick="addBalance()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center transition ml-2">
                            <i class="fas fa-plus text-xs"></i>
                        </button>
                    </div>
                    <button onclick="switchTab('profile')" class="group relative">
                        <div class="w-12 h-12 rounded-2xl border-2 border-[#ffb400] overflow-hidden flex items-center justify-center bg-gray-800">
                            <i class="fas fa-user text-xl text-[#ffb400]"></i>
                        </div>
                    </button>
                    <button onclick="handleLogout()" class="text-gray-500 hover:text-red-500 transition px-2">
                        <i class="fas fa-power-off text-xl"></i>
                    </button>
                </div>
                <div id="auth-area">
                    <button onclick="openAuthModal()" class="premium-btn px-8 py-3 rounded-2xl">Войти</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="page-main">
            <h1 class="text-4xl font-black mb-10 uppercase italic">Мистери Кейсы</h1>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6" id="cases-grid"></div>
        </div>

        <div id="page-upgrades" class="hidden">
            <div class="max-w-5xl mx-auto glass-card p-12 text-center">
                <i class="fas fa-bolt text-6xl text-[#ffb400] mb-6 block"></i>
                <h2 class="text-4xl font-black mb-4">Система Апгрейдов</h2>
                <p class="text-gray-400 mb-10 text-lg">Скоро появится!</p>
            </div>
        </div>

        <div id="page-profile" class="hidden">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
                <div class="lg:col-span-1">
                    <div class="glass-card p-8 text-center">
                        <div class="w-24 h-24 rounded-3xl premium-btn mx-auto mb-6 flex items-center justify-center text-4xl shadow-xl">
                            <i class="fas fa-crown"></i>
                        </div>
                        <h2 id="prof-email" class="font-black text-xl mb-1 truncate">User</h2>
                        <div class="grid grid-cols-2 gap-2 mt-6">
                            <div class="bg-black/30 p-3 rounded-xl">
                                <div class="text-[#ffb400] font-black" id="prof-opened">0</div>
                                <div class="text-[9px] text-gray-500 font-bold uppercase">Кейсов</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-3">
                    <h3 class="text-2xl font-black italic mb-8">Ваш Инвентарь</h3>
                    <div id="prof-inventory" class="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="modal-case" class="fixed inset-0 z-[200] bg-black/95 backdrop-blur-xl flex items-center justify-center hidden">
        <div class="w-full max-w-6xl px-4 relative">
            <button onclick="closeCaseModal()" class="absolute -top-16 right-4 text-white/40 hover:text-white text-4xl">
                <i class="fas fa-times"></i>
            </button>
            <div class="text-center mb-12">
                <h2 id="c-modal-title" class="text-5xl font-black italic uppercase">CASE</h2>
            </div>
            <div class="relative glass-card p-1 mb-16">
                <div class="roulette-marker"></div>
                <div class="roulette-container h-48 overflow-hidden rounded-xl">
                    <div id="c-carousel" class="case-carousel h-full items-center"></div>
                </div>
            </div>
            <div class="flex flex-col items-center gap-8">
                <div id="c-result" class="hidden transform scale-125">
                    <div id="c-result-card" class="glass-card p-6 flex flex-col items-center border-b-4">
                        <img id="c-result-img" src="" class="w-40 h-40 object-contain">
                        <div id="c-result-name" class="font-black text-xl mt-4">Name</div>
                        <div class="flex gap-3 mt-8">
                            <button onclick="sellWonItem()" class="bg-white/10 px-8 py-3 rounded-xl font-bold">ПРОДАТЬ</button>
                            <button onclick="keepWonItem()" class="premium-btn px-10 py-3 rounded-xl">В ИНВЕНТАРЬ</button>
                        </div>
                    </div>
                </div>
                <button id="c-open-btn" onclick="startRoll()" class="premium-btn px-20 py-6 rounded-3xl text-2xl pulse-effect">
                    ОТКРЫТЬ ЗА <span id="c-modal-price">0</span> ₽
                </button>
            </div>
        </div>
    </div>

    <div id="modal-auth" class="fixed inset-0 z-[300] bg-black/80 flex items-center justify-center hidden p-4">
        <div class="glass-card max-w-md w-full p-10 relative">
            <button onclick="closeModal('modal-auth')" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 id="auth-t" class="text-center text-xl font-bold mb-8">Вход</h3>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none">
                <input id="auth-pass" type="password" placeholder="Пароль" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none">
                <button onclick="handleAuth()" id="auth-main-btn" class="premium-btn w-full py-5 rounded-2xl">Войти</button>
                <button onclick="toggleAuth()" id="auth-sec-btn" class="w-full text-center text-gray-500 text-xs uppercase">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // КОРРЕКТНЫЙ КОНФИГ
        const firebaseConfig = {
            apiKey: "AIzaSyA-8Htang_pmMugvnekBa2s4akqHD7fGYU",
            authDomain: "major-win-b2255.firebaseapp.com",
            projectId: "major-win-b2255",
            storageBucket: "major-win-b2255.firebasestorage.app",
            messagingSenderId: "1088188197034",
            appId: "1:1088188197034:web:57e71de855ec78b32c88d3",
            databaseURL: "https://major-win-b2255-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        let userData = { balance: 0, inventory: [], stats: { opened: 0 } };
        let isReg = false;

        const ITEMS = [
            { id: 1, name: "USP-S | Ticket to Hell", price: 65, rarity: 'rare', img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m1FBRp3_bGcjhQ09-jq5WYh8j_Or7um25V4dB8xOuYp9323lG3-0A6am-nd9SUI1A-YAzZ-FPsx-e8hJS0u8vMziFis3Ym4XfD30vgw5f2RTE/360fx360f" },
            { id: 2, name: "AK-47 | Slate", price: 320, rarity: 'mythical', img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV092lnYmGmOHLPr7Vn35cppR32u_A9on23A3t_hE4Y236IdfDIAQ5MA7Q-VPrxLvu08TvtZzAn3Uws3In-z-DyPbaS8E/360fx360f" },
            { id: 3, name: "Butterfly | Marble Fade", price: 165000, rarity: 'gold', img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf8OD3dzx978yzkL-HnvD8J_XUlD1QuJ13j-rC896h2Vfs80A_am3xLITAdAU9YV_R_lS7wr3ohJ7v6Jicm3V9-n51YVv97_4/360fx360f" }
        ];

        const CASES = [
            { id: 'bronze', name: 'Bronze Case', price: 99, items: [1, 1, 1, 2] },
            { id: 'royal', name: 'Royal Case', price: 9500, items: [2, 2, 3] }
        ];

        // Auth Functions
        window.openAuthModal = () => document.getElementById('modal-auth').classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.toggleAuth = () => {
            isReg = !isReg;
            document.getElementById('auth-t').innerText = isReg ? 'Регистрация' : 'Вход';
            document.getElementById('auth-main-btn').innerText = isReg ? 'Создать' : 'Войти';
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if(isReg) await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
                closeModal('modal-auth');
            } catch(e) { alert("Ошибка: " + e.message); }
        };

        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-area').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                onValue(ref(db, `users/${u.uid}`), snap => {
                    if(snap.exists()) {
                        userData = snap.val();
                        if(!userData.inventory) userData.inventory = [];
                        renderUI();
                    } else {
                        set(ref(db, `users/${u.uid}`), { balance: 500, inventory: [], stats: { opened: 0 } });
                    }
                });
            } else {
                user = null;
                document.getElementById('auth-area').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                switchTab('main');
            }
        });

        // Открытие кейсов
        let rolling = false;
        let selectedCase = null;
        let won = null;

        window.openCaseModalDialog = (id) => {
            if(!user) return openAuthModal();
            selectedCase = CASES.find(c => c.id === id);
            document.getElementById('modal-case').classList.remove('hidden');
            document.getElementById('c-modal-title').innerText = selectedCase.name;
            document.getElementById('c-modal-price').innerText = selectedCase.price;
            document.getElementById('c-open-btn').classList.remove('hidden');
            document.getElementById('c-result').classList.add('hidden');
            
            const carousel = document.getElementById('c-carousel');
            carousel.style.transition = 'none';
            carousel.style.transform = 'translateX(0)';
            
            let html = '';
            for(let i=0; i<80; i++) {
                const it = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                html += `<div class="roulette-item" style="border-bottom-color: var(--rarity-${it.rarity})">
                    <img src="${it.img}" class="w-24 h-24 object-contain">
                </div>`;
            }
            carousel.innerHTML = html;
        };

        window.startRoll = () => {
            if(rolling || userData.balance < selectedCase.price) return alert("Недостаточно средств");
            rolling = true;
            userData.balance -= selectedCase.price;
            userData.stats.opened++;
            update(ref(db, `users/${user.uid}`), { balance: userData.balance, stats: userData.stats });

            document.getElementById('c-open-btn').classList.add('hidden');
            const winnerIdx = 70;
            const carousel = document.getElementById('c-carousel');
            won = ITEMS.find(i => i.id === selectedCase.items[Math.floor(Math.random() * selectedCase.items.length)]);
            
            const winnerEl = carousel.children[winnerIdx];
            winnerEl.innerHTML = `<img src="${won.img}" class="w-24 h-24 object-contain">`;
            winnerEl.style.borderBottomColor = `var(--rarity-${won.rarity})`;

            const move = (winnerIdx * 168) - (document.querySelector('.roulette-container').offsetWidth/2 - 84);
            carousel.style.transition = 'transform 7s cubic-bezier(0.05, 0.3, 0.1, 1)';
            carousel.style.transform = `translateX(-${move}px)`;

            setTimeout(() => {
                rolling = false;
                document.getElementById('c-result').classList.remove('hidden');
                document.getElementById('c-result-img').src = won.img;
                document.getElementById('c-result-name').innerText = won.name;
                document.getElementById('c-result-card').style.borderBottomColor = `var(--rarity-${won.rarity})`;
            }, 7500);
        };

        window.sellWonItem = () => {
            userData.balance += won.price;
            update(ref(db, `users/${user.uid}`), { balance: userData.balance });
            closeCaseModal();
        };

        window.keepWonItem = () => {
            if(!userData.inventory) userData.inventory = [];
            userData.inventory.push({ ...won, uid: Date.now() });
            update(ref(db, `users/${user.uid}`), { inventory: userData.inventory });
            closeCaseModal();
        };

        window.closeCaseModal = () => { if(!rolling) closeModal('modal-case'); };

        window.switchTab = (tab) => {
            ['main','upgrades','profile'].forEach(id => document.getElementById(`page-${id}`).classList.add('hidden'));
            document.getElementById(`page-${tab}`).classList.remove('hidden');
        };

        function renderUI() {
            document.getElementById('user-balance').innerText = userData.balance.toFixed(2);
            document.getElementById('prof-email').innerText = user.email.split('@')[0];
            document.getElementById('prof-opened').innerText = userData.stats.opened;
            const inv = document.getElementById('prof-inventory');
            inv.innerHTML = (userData.inventory || []).map(i => `
                <div class="glass-card p-4 item-glow-${i.rarity}">
                    <img src="${i.img}" class="w-full h-32 object-contain">
                    <div class="mt-4 text-[10px] font-bold text-gray-500 uppercase">${i.name}</div>
                    <div class="text-[#ffb400] font-black">${i.price} ₽</div>
                </div>
            `).join('');
        }

        window.addBalance = () => {
            const amt = 5000;
            userData.balance += amt;
            update(ref(db, `users/${user.uid}`), { balance: userData.balance });
        };

        // Запуск витрины
        document.getElementById('cases-grid').innerHTML = CASES.map(c => `
            <div onclick="openCaseModalDialog('${c.id}')" class="glass-card case-card p-6 cursor-pointer flex flex-col items-center">
                <img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNkHpXUdfXTe_hmo6rV1J6LhFasL6kJAhu0uD3cz5Y69uzlY6MlfPyP-vVlz0Csccgj-_E99im3gLsqUVuMGr1ddLAdQY_N1HQ_wS4l7-70Je9us_XiSwS/360fx360f" class="w-40 h-40 object-contain">
                <div class="mt-4 text-center">
                    <div class="font-black italic uppercase text-sm">${c.name}</div>
                    <div class="text-[#ffb400] font-black text-xl">${c.price} ₽</div>
                </div>
            </div>
        `).join('');

    </script>
</body>
</html>
